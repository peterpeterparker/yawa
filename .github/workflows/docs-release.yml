name: Docs Release

on:
  push:
    tags:
      - "docs/v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Install kyu
        run: |
          curl -fsSL https://kyushu.dev/install | bash
          echo "/root/.kyu/bin" >> $GITHUB_PATH

      - name: Build
        working-directory: packages/docs
        run: kyu build

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: worker
          path: packages/docs/worker/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: worker
          path: worker/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KYUSHU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.KYUSHU_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          rsync -avz ./worker deploy-yawa-docs@${{ secrets.KYUSHU_HOST }}:/opt/yawa/docs/
          ssh deploy-yawa-docs@${{ secrets.KYUSHU_HOST }} "sudo systemctl restart yawa-docs"
