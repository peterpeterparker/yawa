name: Tracker Release

on:
  push:
    tags:
      - "tracker/v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Build
        run: bun run --filter yawa-tracker build

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install npm 11.17.0 # Requires at least v11.15.0 for stage command
        run: npm install -g npm@11.17.0

      - name: Publish
        working-directory: packages/tracker
        run: npm stage publish --access public --provenance
