name: Tests

on:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Tests
        run: bun test

  may-merge:
    needs: ["tests"]
    runs-on: ubuntu-latest
    steps:
      - name: Cleared for merging
        run: echo OK
